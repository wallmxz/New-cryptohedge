<div class="card">
    <p class="card-title">Hedge</p>
    <div>
        <div class="metric-row">
            <span class="metric-label">Lado</span>
            <span class="metric-value metric-down" x-text="state.hedge_position ? (state.hedge_position.side === 'short' ? 'Vendido' : 'Comprado') : 'Nenhum'">-</span>
        </div>
        <div class="metric-row">
            <span class="metric-label">Tamanho</span>
            <span class="metric-value" x-text="state.hedge_position ? '$' + state.hedge_position.size.toFixed(2) : '-'">-</span>
        </div>
        <div class="metric-row">
            <span class="metric-label">Entrada</span>
            <span class="metric-value" style="color:#94a3b8" x-text="state.hedge_position ? state.hedge_position.entry.toFixed(4) : '-'">-</span>
        </div>
        <div class="divider"></div>
        <div class="metric-row">
            <span class="metric-label">PnL aberto</span>
            <span class="metric-value" :class="state.hedge_unrealized_pnl >= 0 ? 'metric-up' : 'metric-down'" x-text="'$' + state.hedge_unrealized_pnl.toFixed(2)">$0.00</span>
        </div>
        <div class="metric-row">
            <span class="metric-label">Exposicao</span>
            <span class="metric-value metric-warn" x-text="(exposurePct * 100).toFixed(1) + '%'">0%</span>
        </div>
    </div>
</div>
