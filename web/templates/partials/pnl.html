<div class="card">
    <p class="card-title">Detalhes de PnL</p>
    <div>
        <div class="metric-row">
            <span class="metric-label">Taxas recebidas</span>
            <span class="metric-value metric-up" x-text="'+$' + state.total_fees_earned.toFixed(2)">$0.00</span>
        </div>
        <div class="metric-row">
            <span class="metric-label">Corretagem paga</span>
            <span class="metric-value metric-down" x-text="'-$' + state.total_fees_paid.toFixed(2)">$0.00</span>
        </div>
        <div class="divider"></div>
        <div class="metric-row">
            <span class="metric-label">PnL da Pool</span>
            <span class="metric-value" :class="pnl.pool >= 0 ? 'metric-up' : 'metric-down'" x-text="(pnl.pool >= 0 ? '+' : '') + '$' + pnl.pool.toFixed(2)">$0.00</span>
        </div>
        <div class="metric-row">
            <span class="metric-label">PnL do Hedge</span>
            <span class="metric-value" :class="pnl.hedge >= 0 ? 'metric-up' : 'metric-down'" x-text="(pnl.hedge >= 0 ? '+' : '') + '$' + pnl.hedge.toFixed(2)">$0.00</span>
        </div>
        <div class="metric-row">
            <span class="metric-label">Funding</span>
            <span class="metric-value" :class="state.funding_total >= 0 ? 'metric-up' : 'metric-down'" x-text="(state.funding_total >= 0 ? '+' : '') + '$' + state.funding_total.toFixed(2)">$0.00</span>
        </div>
    </div>
</div>
