<div class="card">
    <p class="card-title">Relatorios</p>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        <div>
            <p class="text-xs text-slate-400 mb-1">Execucoes maker</p>
            <p class="text-lg font-bold text-slate-800" x-text="state.total_maker_fills">0</p>
            <p class="text-xs text-slate-400" x-text="'$' + state.total_maker_volume.toFixed(0)">$0</p>
        </div>
        <div>
            <p class="text-xs text-slate-400 mb-1">Execucoes taker</p>
            <p class="text-lg font-bold text-slate-800" x-text="state.total_taker_fills">0</p>
            <p class="text-xs text-slate-400" x-text="'$' + state.total_taker_volume.toFixed(0)">$0</p>
        </div>
        <div>
            <p class="text-xs text-slate-400 mb-1">Taxa maker</p>
            <p class="text-lg font-bold text-emerald-600"
               x-text="state.total_maker_fills + state.total_taker_fills > 0 ? (state.total_maker_fills / (state.total_maker_fills + state.total_taker_fills) * 100).toFixed(1) + '%' : '-'">-</p>
        </div>
        <div>
            <p class="text-xs text-slate-400 mb-1">Corretagem total</p>
            <p class="text-lg font-bold text-slate-800" x-text="'$' + state.total_fees_paid.toFixed(2)">$0.00</p>
        </div>
    </div>
</div>
