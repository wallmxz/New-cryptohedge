<div class="card">
    <p class="card-title">Pool</p>
    <div>
        <div class="metric-row">
            <span class="metric-label">Valor atual</span>
            <span class="metric-value" x-text="'$' + state.pool_value_usd.toFixed(2)">$0.00</span>
        </div>
        <div class="divider"></div>
        <div class="metric-row">
            <span class="metric-label">ARB</span>
            <span class="metric-value" x-text="(state.pool_tokens.ARB || 0).toFixed(2)">0</span>
        </div>
        <div class="metric-row">
            <span class="metric-label">WETH</span>
            <span class="metric-value" x-text="(state.pool_tokens.WETH || 0).toFixed(4)">0</span>
        </div>
    </div>
</div>
