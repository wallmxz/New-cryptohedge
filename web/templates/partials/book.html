<div class="card">
    <p class="card-title">Livro de ofertas</p>
    <div x-show="hasBook">
        <div class="book-row book-ask">
            <span x-text="state.best_ask.toFixed(4)"></span>
            <span class="text-slate-400 text-xs">best ask</span>
        </div>
        <template x-if="myAsk">
            <div class="book-row book-mine">
                <span x-text="myAsk.price.toFixed(4)"></span>
                <div class="flex items-center gap-2">
                    <span class="text-slate-400" x-text="myAsk.size.toFixed(2)"></span>
                    <span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full font-semibold">minha</span>
                </div>
            </div>
        </template>
        <div class="book-spread">
            spread: <span x-text="spreadTicks.toFixed(1)"></span> ticks
        </div>
        <template x-if="myBid">
            <div class="book-row book-mine">
                <span x-text="myBid.price.toFixed(4)"></span>
                <div class="flex items-center gap-2">
                    <span class="text-slate-400" x-text="myBid.size.toFixed(2)"></span>
                    <span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full font-semibold">minha</span>
                </div>
            </div>
        </template>
        <div class="book-row book-bid">
            <span x-text="state.best_bid.toFixed(4)"></span>
            <span class="text-slate-400 text-xs">best bid</span>
        </div>
    </div>
    <div x-show="!hasBook" class="text-center py-8 text-slate-400 text-sm">Sem conexao com a exchange</div>
</div>
