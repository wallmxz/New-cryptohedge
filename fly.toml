app = "automoney"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "true"
  DB_PATH = "/data/automoney.db"
  LOG_FORMAT = "json"
  START_ENGINE = "true"

[mounts]
  source = "automoney_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 8000
    path = "/health"
    interval = "15s"
    timeout = "5s"

  [checks.engine_alive]
    type = "http"
    port = 8000
    path = "/health/engine"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
